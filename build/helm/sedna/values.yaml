global:
  runtimeService:
    # This is an install-profile guard, not a controller feature gate. Enabling
    # it selects explicit fork-built images and fails rendering if either is absent.
    enabled: false
    gmImage: ""
    lcImage: ""

kb:
  image: kubeedge/sedna-kb:v0.4.3
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi

gm:
  # Legacy/default image. The managed profile uses global.runtimeService.gmImage.
  image: kubeedge/sedna-gm:v0.4.3
  resources:
    requests:
      memory: 32Mi
      cpu: 100m
    limits:
      memory: 256Mi
  # gm-config
  kubeConfig: ""
  master: ""
  namespace: ""
  websocket:
    address: 0.0.0.0
    port: 9000
  localController:
    server: http://localhost:9100
  knowledgeBaseServer:
    server: http://kb.sedna:9020

lc:
  # Legacy/default image. The managed profile uses global.runtimeService.lcImage.
  image: kubeedge/sedna-lc:v0.4.3
  resources:
    requests:
      memory: 32Mi
      cpu: 100m
    limits:
      memory: 128Mi
