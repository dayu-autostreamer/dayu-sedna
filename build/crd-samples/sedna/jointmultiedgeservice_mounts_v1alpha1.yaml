apiVersion: sedna.io/v1alpha1
kind: JointMultiEdgeService
metadata:
  name: camera-detector
  namespace: auto-edge
spec:
  edgeWorker:
    - file:
        paths:
          - /home/nvidia/legacy/models/model.bin
      kubeConfig:
        path: /home/nvidia/.kube
      logLevel:
        level: "DEBUG"
      mounts:
        - name: camera0
          source:
            type: hostPath
            hostPath:
              path: /dev/video0
              pathType: CharDevice
          target:
            path: /dev/video0
          containers:
            - detector
          envName: CAMERA_DEVICE
        - name: app-config
          source:
            type: hostPath
            hostPath:
              prefix: /home/nvidia/app
              path: configs/config.yaml
              pathType: File
          # source path on host: /home/nvidia/app/configs/config.yaml
          # target.path omitted -> mount to /home/data/configs/config.yaml in container
          envName: APP_CONFIG
        - name: model-dir
          source:
            type: hostPath
            hostPath:
              path: /home/nvidia/models
              pathType: Directory
          target:
            path: /models
            readOnly: true
          envName: MODEL_DIR
      template:
        spec:
          nodeName: edge1
          containers:
            - name: detector
              image: your-image:latest
              securityContext:
                privileged: true
