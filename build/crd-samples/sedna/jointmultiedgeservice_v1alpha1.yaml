apiVersion: sedna.io/v1alpha1
kind: JointMultiEdgeService
metadata:
  name: legacy-file-mount-demo
  namespace: auto-edge
spec:
  edgeWorker:
    - file:
        path: /home/nvidia/zwh/Auto-Edge/files/config.yaml
      kubeConfig:
        path: /home/nvidia/.kube
      logLevel:
        level: DEBUG
      template:
        spec:
          nodeName: edge1
          dnsPolicy: ClusterFirstWithHostNet
          containers:
            - name: detector
              image: onecheck/car-detection:arm64-v1.0.0
              imagePullPolicy: IfNotPresent
              env:
                - name: APP_CONFIG
                  value: /home/data/volume0/config.yaml
              ports:
                - containerPort: 9001
                  hostPort: 39001
    - file:
        paths:
          - /home/nvidia/zwh/Auto-Edge/files/config.yaml
          - /home/nvidia/zwh/Auto-Edge/model_lib/model.pt
      kubeConfig:
        path: /home/nvidia/.kube
      logLevel:
        level: DEBUG
      template:
        spec:
          nodeName: edge2
          dnsPolicy: ClusterFirstWithHostNet
          containers:
            - name: detector
              image: onecheck/car-detection:arm64-v1.0.0
              imagePullPolicy: IfNotPresent
              env:
                - name: APP_CONFIG
                  value: /home/data/volume0/config.yaml
                - name: MODEL_PATH
                  value: /home/data/volume1/model.pt
              ports:
                - containerPort: 9001
                  hostPort: 39001
  cloudWorker:
    file:
      path: /home/hx/zwh/Auto-Edge/model_lib/model.pt
    kubeConfig:
      path: /home/hx/.kube
    logLevel:
      level: INFO
    template:
      spec:
        nodeName: cloud.kubeedge
        dnsPolicy: ClusterFirstWithHostNet
        containers:
          - name: detector
            image: onecheck/car-detection:v1.0.0
            imagePullPolicy: IfNotPresent
            env:
              - name: MODEL_PATH
                value: /home/data/volume0/model.pt
            ports:
              - containerPort: 9001
                hostPort: 39001
